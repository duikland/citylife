name: Build CityLife Debug APK

on:
  push:
    branches:
      - main
      - feat/android-tv
      - android-tv
  pull_request:
    branches:
      - main
      - feat/android-tv
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: android-wrapper

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "gradle"
          cache-dependency-path: android-wrapper/gradle/wrapper/gradle-wrapper.properties

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "Created local.properties with SDK path"

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Create debug keystore
        run: |
          mkdir -p $GITHUB_WORKSPACE/../keystores
          keytool -genkey -v -keystore $GITHUB_WORKSPACE/../keystores/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          echo "Debug keystore created at $GITHUB_WORKSPACE/../keystores/debug.keystore"

      - name: Extract version from build.gradle
        id: extract_version
        run: |
          VERSION_NAME=$(grep -E "^[[:space:]]*versionName[[:space:]]*(=[[:space:]]*)?['\"]" app/build.gradle | awk -F"['\"]" '{print $2}')
          if [ -z "$VERSION_NAME" ]; then
            VERSION_NAME="1.0"
          fi
          echo "version=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION_NAME"

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: citylife-debug-v${{ steps.extract_version.outputs.version }}
          path: android-wrapper/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
