name: Docker

# Versioned image + GitOps auto-deploy, mirroring kooker-web. Now that citylife lives in the
# duikindiesee org (same org as kooker-infra + the shared workflows + the self-hosted runner), it
# reuses the SAME reusable workflows kooker-web uses, so versioning works identically:
#
#   1. node-version-bump  - on every merge to main, opens a chore/bump-X.Y.Z PR that auto-merges
#                           (Conventional Commits: feat -> minor, fix/other -> patch). This is the
#                           "auto-merged version bump" that the old cross-org run_number scheme lacked.
#   2. build-and-push     - builds ghcr.io/duikindiesee/citylife:<semver> (+ sha + latest) on the
#                           bumped version, with APP_VERSION baked into the image for traceability.
#   3. gitops-sync        - pins that semver into manifests/overlays/develop/citylife in kooker-infra,
#                           so Argo rolls the Deployment to the exact version each release.
#
# Cross-org tokens are no longer needed: same org => the self-hosted runner and MAVEN_PUBLISH_TOKEN are
# inherited via `secrets: inherit`. The image carries NO credentials (runtime auth via the nginx layer).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write # node-version-bump commits the bump
  packages: write # build-and-push + retention
  pull-requests: write # node-version-bump opens the bump PR

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: false # never cancel a build/deploy mid-flight

jobs:
  # STEP 1 - bump the package.json version on every merge to main (before build)
  version-bump:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: duikindiesee/kooker-workflows/.github/workflows/node-version-bump.yml@main
    secrets: inherit

  # STEP 2 - build & push the versioned image
  build-and-push:
    needs: [version-bump]
    if: always() && (needs.version-bump.result == 'success' || needs.version-bump.result == 'skipped') && !startsWith(github.head_ref, 'chore/bump')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 1

      - name: Cache Android APK
        id: cache-apk
        uses: actions/cache@v4
        with:
          path: public/citylife.apk
          key: android-apk-${{ hashFiles('android-wrapper/**') }}

      - name: Set up JDK 17
        if: steps.cache-apk.outputs.cache-hit != 'true'
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "gradle"
          cache-dependency-path: android-wrapper/gradle/wrapper/gradle-wrapper.properties

      - name: Setup Android SDK
        if: steps.cache-apk.outputs.cache-hit != 'true'
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        if: steps.cache-apk.outputs.cache-hit != 'true'
        run: chmod +x android-wrapper/gradlew

      - name: Create debug keystore
        if: steps.cache-apk.outputs.cache-hit != 'true'
        run: |
          mkdir -p $GITHUB_WORKSPACE/../keystores
          keytool -genkey -v -keystore $GITHUB_WORKSPACE/../keystores/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          echo "Debug keystore created at $GITHUB_WORKSPACE/../keystores/debug.keystore"

      - name: Build Debug APK
        if: steps.cache-apk.outputs.cache-hit != 'true'
        run: |
          cd android-wrapper
          ./gradlew assembleDebug

      - name: Copy APK to public folder
        if: steps.cache-apk.outputs.cache-hit != 'true'
        run: |
          mkdir -p public
          cp android-wrapper/app/build/outputs/apk/debug/app-debug.apk public/citylife.apk
          echo "Copied APK to public/citylife.apk"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck + test
        run: |
          npm run typecheck
          npm test

      - name: Read version
        id: ver
        run: |
          # Prefer the version-bump output (the bumped value, even before package.json on main is
          # updated) so the image tag always matches what gitops-sync writes to kooker-infra.
          BUMP_VER="${{ needs.version-bump.outputs.new-version }}"
          PKG_VER=$(node -p "require('./package.json').version")
          VERSION="${BUMP_VER:-$PKG_VER}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "CityLife version: ${VERSION} (bump=${BUMP_VER} pkg=${PKG_VER})"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/duikindiesee/citylife
          tags: |
            type=raw,value=${{ steps.ver.outputs.version }}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.ver.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # STEP 3 - keep the last few GHCR images
  retention:
    needs: build-and-push
    if: github.event_name == 'push'
    permissions:
      packages: write
      contents: read
    uses: duikindiesee/kooker-workflows/.github/workflows/ghcr-retention.yml@main
    secrets:
      MAVEN_PUBLISH_TOKEN: ${{ secrets.MAVEN_PUBLISH_TOKEN }}

  # STEP 4 - pin the semver into the kooker-infra citylife overlay (Argo then rolls the Deployment)
  deploy:
    needs: [version-bump, build-and-push]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: duikindiesee/kooker-workflows/.github/workflows/gitops-sync.yml@main
    with:
      image_name: ghcr.io/duikindiesee/citylife
      new_tag: ${{ needs.version-bump.outputs.new-version }}
      kustomize_path: manifests/overlays/develop/citylife
      target_branch: main
    secrets: inherit
